<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Substation — HMI</title>
<script src="/vendor_js/socket.io.min.js"></script>
<script src="/vendor_js/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #12161a;
    --panel: #1b2127;
    --panel-border: #2a323a;
    --text-primary: #d8dee3;
    --text-dim: #7d8892;
    --mono: 'Consolas', 'SF Mono', 'Cascadia Code', monospace;
    --closed: #3fae5a;
    --open: #4b5560;
    --tripped: #d64545;
    --warn: #d6a545;
    --line: #5a6a78;
    --line-energized: #d6a545;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text-primary); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; }

  #alarm-banner { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; min-height: 20px; }
  .alarm-chip {
    font-family: var(--mono); font-size: 12px; padding: 5px 10px; border-radius: 3px;
    display: flex; align-items: center; gap: 8px; animation: pulse 1.4s infinite;
  }
  .alarm-chip.High { background: #4a1a1a; border: 1px solid var(--tripped); color: #ff8a8a; }
  .alarm-chip.Medium { background: #4a3a1a; border: 1px solid var(--warn); color: #ffce7a; }
  .alarm-chip.Low { background: #3a3a1a; border: 1px solid #999; color: #d8d8a0; }
  .alarm-chip.ack { animation: none; opacity: 0.55; }
  .alarm-chip button { background: none; border: 1px solid currentColor; color: inherit; font-size: 10px; padding: 2px 6px; border-radius: 2px; cursor: pointer; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 6px; padding: 14px; }
  .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin: 0 0 10px 0; font-weight: 600; }

  svg text { font-family: var(--mono); }
  .equip-label { font-size: 11px; fill: var(--text-dim); font-family: 'Segoe UI', Arial, sans-serif; }
  .equip-value { font-size: 12px; fill: var(--text-primary); font-weight: bold; }

  .ctrl-group { border-bottom: 1px solid var(--panel-border); padding: 10px 0; }
  .ctrl-group:last-child { border-bottom: none; }
  .ctrl-title { font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; }
  .ctrl-btns button {
    font-family: inherit; font-size: 11px; padding: 4px 9px; margin-right: 4px;
    border-radius: 3px; border: 1px solid var(--panel-border); background: #232a31;
    color: var(--text-primary); cursor: pointer;
  }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  #chart-container { height: 220px; margin-top: 16px; }
</style>
</head>
<body>

<h1>⚡ Substation — HMI Single-Line Diagram</h1>
<div class="subtitle">Simulated RTU/protective relays over Modbus TCP · Live process view · Portfolio demo project</div>

<div id="alarm-banner"><span style="color: var(--text-dim); font-size: 12px;">No active alarms</span></div>

<div class="layout">
  <div class="panel">
    <h2>Single-Line Diagram</h2>
    <svg id="mimic" viewBox="0 0 900 380" width="100%">
      <!-- Incoming line -->
      <line x1="40" y1="60" x2="90" y2="60" stroke="var(--line)" stroke-width="4"/>
      <text x="10" y="45" class="equip-label">Utility</text>
      <text x="10" y="80" class="equip-label">Incoming</text>
      <text id="val-vt101" x="10" y="96" class="equip-value">--</text>

      <!-- CB-101 -->
      <rect id="cb101-icon" x="90" y="45" width="30" height="30" fill="var(--open)" stroke="#000"/>
      <text x="105" y="35" text-anchor="middle" class="equip-label">CB-101</text>
      <line id="line-cb101-xfmr" x1="120" y1="60" x2="180" y2="60" stroke="var(--line)" stroke-width="4"/>
      <text id="val-ct101" x="150" y="45" text-anchor="middle" class="equip-value">--</text>

      <!-- Transformer T-1 -->
      <circle cx="200" cy="52" r="20" fill="#232a31" stroke="var(--line)" stroke-width="2"/>
      <circle cx="200" cy="72" r="20" fill="#232a31" stroke="var(--line)" stroke-width="2"/>
      <text x="200" y="105" text-anchor="middle" class="equip-label">T-1</text>
      <text id="val-tt201" x="200" y="120" text-anchor="middle" class="equip-value">--</text>
      <text id="val-tt202" x="200" y="134" text-anchor="middle" class="equip-value">--</text>

      <line id="line-xfmr-bus" x1="220" y1="60" x2="280" y2="60" stroke="var(--line)" stroke-width="4"/>

      <!-- Bus -->
      <line id="bus-bar" x1="280" y1="60" x2="820" y2="60" stroke="var(--line)" stroke-width="6"/>
      <text x="550" y="40" text-anchor="middle" class="equip-label">Secondary Bus</text>
      <text id="val-vt301" x="500" y="40" text-anchor="middle" class="equip-value" dx="60">--</text>
      <text id="val-freq" x="700" y="40" text-anchor="middle" class="equip-value">--</text>

      <!-- Feeder 1 -->
      <line id="line-bus-f1" x1="380" y1="60" x2="380" y2="110" stroke="var(--line)" stroke-width="4"/>
      <rect id="cb201-icon" x="365" y="110" width="30" height="30" fill="var(--open)" stroke="#000"/>
      <text x="380" y="102" text-anchor="middle" class="equip-label">CB-201</text>
      <line id="line-f1-load" x1="380" y1="140" x2="380" y2="190" stroke="var(--line)" stroke-width="4"/>
      <text x="380" y="205" text-anchor="middle" class="equip-label">Feeder 1</text>
      <text id="val-ct401" x="380" y="220" text-anchor="middle" class="equip-value">--</text>

      <!-- Feeder 2 -->
      <line id="line-bus-f2" x1="550" y1="60" x2="550" y2="110" stroke="var(--line)" stroke-width="4"/>
      <rect id="cb202-icon" x="535" y="110" width="30" height="30" fill="var(--open)" stroke="#000"/>
      <text x="550" y="102" text-anchor="middle" class="equip-label">CB-202</text>
      <line id="line-f2-load" x1="550" y1="140" x2="550" y2="190" stroke="var(--line)" stroke-width="4"/>
      <text x="550" y="205" text-anchor="middle" class="equip-label">Feeder 2</text>
      <text id="val-ct402" x="550" y="220" text-anchor="middle" class="equip-value">--</text>

      <!-- Feeder 3 -->
      <line id="line-bus-f3" x1="720" y1="60" x2="720" y2="110" stroke="var(--line)" stroke-width="4"/>
      <rect id="cb203-icon" x="705" y="110" width="30" height="30" fill="var(--open)" stroke="#000"/>
      <text x="720" y="102" text-anchor="middle" class="equip-label">CB-203</text>
      <line id="line-f3-load" x1="720" y1="140" x2="720" y2="190" stroke="var(--line)" stroke-width="4"/>
      <text x="720" y="205" text-anchor="middle" class="equip-label">Feeder 3</text>
      <text id="val-ct403" x="720" y="220" text-anchor="middle" class="equip-value">--</text>
    </svg>
  </div>

  <div class="panel">
    <h2>Operator Controls</h2>

    <div class="ctrl-group">
      <div class="ctrl-title"><span class="status-dot" id="dot-cb101"></span>CB-101 Incoming Breaker</div>
      <div class="ctrl-btns">
        <button onclick="sendLevel('CB101_CLOSE', true)">Close</button>
        <button onclick="sendLevel('CB101_CLOSE', false)">Open</button>
        <button onclick="sendPulse('CB101_RESET')">Reset</button>
      </div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title"><span class="status-dot" id="dot-cb201"></span>CB-201 Feeder 1</div>
      <div class="ctrl-btns">
        <button onclick="sendLevel('CB201_CLOSE', true)">Close</button>
        <button onclick="sendLevel('CB201_CLOSE', false)">Open</button>
        <button onclick="sendPulse('CB201_RESET')">Reset</button>
      </div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title"><span class="status-dot" id="dot-cb202"></span>CB-202 Feeder 2</div>
      <div class="ctrl-btns">
        <button onclick="sendLevel('CB202_CLOSE', true)">Close</button>
        <button onclick="sendLevel('CB202_CLOSE', false)">Open</button>
        <button onclick="sendPulse('CB202_RESET')">Reset</button>
      </div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-title"><span class="status-dot" id="dot-cb203"></span>CB-203 Feeder 3</div>
      <div class="ctrl-btns">
        <button onclick="sendLevel('CB203_CLOSE', true)">Close</button>
        <button onclick="sendLevel('CB203_CLOSE', false)">Open</button>
        <button onclick="sendPulse('CB203_RESET')">Reset</button>
      </div>
    </div>

    <h2 style="margin-top:18px;">Trend</h2>
    <div id="chart-container"><canvas id="trendChart"></canvas></div>
  </div>
</div>

<script>
const socket = io();
const trendData = { labels: [], vt301: [], ct101: [], tt201: [] };
const MAX_POINTS = 60;

const ctx = document.getElementById('trendChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: trendData.labels,
    datasets: [
      { label: 'Bus kV', data: trendData.vt301, borderColor: '#3f7fae', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y' },
      { label: 'Incoming A', data: trendData.ct101, borderColor: '#d6a545', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y1' },
      { label: 'Winding \u00b0C', data: trendData.tt201, borderColor: '#3fae5a', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y1' },
    ],
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    scales: {
      x: { display: false },
      y: { position: 'left', ticks: { color: '#7d8892', font: { size: 9 } }, grid: { color: '#2a323a' } },
      y1: { position: 'right', ticks: { color: '#7d8892', font: { size: 9 } }, grid: { display: false } },
    },
    plugins: { legend: { labels: { color: '#d8dee3', font: { size: 10 } } } },
  },
});

function sendLevel(tag, state) {
  socket.emit('command', { tag, state });
}
function sendPulse(tag) {
  socket.emit('command', { tag, state: true });
  setTimeout(() => socket.emit('command', { tag, state: false }), 500);
}
function ackAlarm(id) {
  socket.emit('ack_alarm', { id });
}

function breakerColor(closed, tripped) {
  if (tripped) return 'var(--tripped)';
  if (closed) return 'var(--closed)';
  return 'var(--open)';
}

socket.on('tag_update', (data) => {
  const t = data.tags;
  if (!t || Object.keys(t).length === 0) return;

  document.getElementById('val-vt101').textContent = t.vt101.toFixed(1) + ' kV';
  document.getElementById('val-ct101').textContent = t.ct101.toFixed(0) + ' A';
  document.getElementById('val-tt201').textContent = 'Wdg ' + t.tt201.toFixed(0) + '\u00b0C';
  document.getElementById('val-tt202').textContent = 'Oil ' + t.tt202.toFixed(0) + '\u00b0C';
  document.getElementById('val-vt301').textContent = t.vt301.toFixed(2) + ' kV';
  document.getElementById('val-freq').textContent = t.freq.toFixed(2) + ' Hz';
  document.getElementById('val-ct401').textContent = t.ct401.toFixed(0) + ' A';
  document.getElementById('val-ct402').textContent = t.ct402.toFixed(0) + ' A';
  document.getElementById('val-ct403').textContent = t.ct403.toFixed(0) + ' A';

  document.getElementById('cb101-icon').setAttribute('fill', breakerColor(t.cb101_closed, t.cb101_tripped));
  document.getElementById('cb201-icon').setAttribute('fill', breakerColor(t.cb201_closed, t.cb201_tripped));
  document.getElementById('cb202-icon').setAttribute('fill', breakerColor(t.cb202_closed, t.cb202_tripped));
  document.getElementById('cb203-icon').setAttribute('fill', breakerColor(t.cb203_closed, t.cb203_tripped));

  ['cb101', 'cb201', 'cb202', 'cb203'].forEach((b) => {
    const dot = document.getElementById('dot-' + b);
    dot.style.background = breakerColor(t[b + '_closed'], t[b + '_tripped']);
  });

  const energized = (id, on) => document.getElementById(id).setAttribute('stroke', on ? 'var(--line-energized)' : 'var(--line)');
  energized('line-cb101-xfmr', t.cb101_closed);
  energized('line-xfmr-bus', t.cb101_closed);
  energized('bus-bar', t.cb101_closed);
  energized('line-bus-f1', t.cb201_closed);
  energized('line-f1-load', t.cb201_closed);
  energized('line-bus-f2', t.cb202_closed);
  energized('line-f2-load', t.cb202_closed);
  energized('line-bus-f3', t.cb203_closed);
  energized('line-f3-load', t.cb203_closed);

  const nowLabel = new Date().toLocaleTimeString();
  trendData.labels.push(nowLabel);
  trendData.vt301.push(t.vt301);
  trendData.ct101.push(t.ct101);
  trendData.tt201.push(t.tt201);
  if (trendData.labels.length > MAX_POINTS) {
    trendData.labels.shift(); trendData.vt301.shift();
    trendData.ct101.shift(); trendData.tt201.shift();
  }
  chart.update('none');

  renderAlarms(data.alarms || []);
});

function renderAlarms(alarms) {
  const banner = document.getElementById('alarm-banner');
  const active = alarms.filter(a => a.active);
  if (active.length === 0) {
    banner.innerHTML = '<span style="color: var(--text-dim); font-size: 12px;">No active alarms</span>';
    return;
  }
  const priorityOrder = { High: 0, Medium: 1, Low: 2 };
  active.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
  banner.innerHTML = active.map(a => `
    <div class="alarm-chip ${a.priority} ${a.acknowledged ? 'ack' : ''}">
      <span>[${a.priority}] ${a.description}</span>
      ${a.acknowledged ? '' : `<button onclick="ackAlarm('${a.id}')">ACK</button>`}
    </div>
  `).join('');
}
</script>

</body>
</html>
